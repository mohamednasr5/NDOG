<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Lost in the Nile | NileDogs</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/icons/favicon.png" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/animations.css" />
</head>
<body style="margin:0;overflow:hidden">
  <div class="scene-404">
    <!-- Falling coin -->
    <div class="coin-404">
      <img src="/assets/icons/icon-512.png" alt="NDOG coin" />
    </div>

    <!-- Water surface -->
    <div class="water-surface">
      <!-- Reflection -->
      <div class="reflection">
        <img src="/assets/icons/icon-512.png" alt="" style="width:100%;border-radius:50%;opacity:0.5" />
      </div>
      <!-- Ripples -->
      <div class="ripple"></div>
      <div class="ripple ripple--2"></div>
      <div class="ripple ripple--3"></div>
      <!-- Splashes -->
      <span class="splash splash--1"></span>
      <span class="splash splash--2"></span>
      <span class="splash splash--3"></span>
      <span class="splash splash--4"></span>
      <span class="splash splash--5"></span>
      <span class="splash splash--6"></span>
      <!-- Bubbles -->
      <div class="bubble" style="left:10%;animation-delay:0s;width:8px"></div>
      <div class="bubble" style="left:25%;animation-delay:1s;width:12px"></div>
      <div class="bubble" style="left:45%;animation-delay:2s;width:6px"></div>
      <div class="bubble" style="left:65%;animation-delay:1.5s;width:10px"></div>
      <div class="bubble" style="left:80%;animation-delay:0.5s;width:14px"></div>
      <div class="bubble" style="left:90%;animation-delay:2.5s;width:7px"></div>
    </div>

    <!-- Text -->
    <div class="text-404">
      <h1>404</h1>
      <p data-i18n="notfound.body">The NDOG coin slipped into the river. Redirecting you home…</p>
      <div class="countdown" id="countdown">10</div>
      <a href="/" class="btn btn--primary btn--lg" style="margin-top:24px">Go Home Now</a>
    </div>
  </div>

  <script>
    // Countdown + auto-redirect
    let seconds = 10;
    const el = document.getElementById("countdown");
    const timer = setInterval(() => {
      seconds--;
      el.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = "/";
      }
    }, 1000);

    // Generate extra bubbles dynamically
    const surface = document.querySelector(".water-surface");
    for (let i = 0; i < 15; i++) {
      const b = document.createElement("div");
      b.className = "bubble";
      b.style.left = Math.random() * 100 + "%";
      b.style.width = (4 + Math.random() * 12) + "px";
      b.style.height = b.style.width;
      b.style.animationDelay = (Math.random() * 4) + "s";
      b.style.animationDuration = (3 + Math.random() * 3) + "s";
      surface.appendChild(b);
    }
  </script>
</body>
</html>
