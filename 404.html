<title id="pageTitle">404 — NDOG Lost in the Nile</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script>
  // Language detection & setup
  (function() {
    const urlLang = new URLSearchParams(location.search).get('lang');
    const storedLang = localStorage.getItem('ndog_lang');
    const browserLang = navigator.language || navigator.userLanguage || '';
    
    let detected = 'en';
    if (urlLang && ['ar', 'en'].includes(urlLang)) {
      detected = urlLang;
      localStorage.setItem('ndog_lang', urlLang);
    } else if (storedLang && ['ar', 'en'].includes(storedLang)) {
      detected = storedLang;
    } else if (browserLang.toLowerCase().startsWith('ar')) {
      detected = 'ar';
    }
    
    document.documentElement.lang = detected;
    if (detected === 'ar') {
      document.documentElement.dir = 'rtl';
    }
    document.documentElement.dataset.lang = detected;
  })();
</script>
<style>
  /* RTL adjustments */
  html[dir="rtl"] {
    direction: rtl;

<style>

    radial-gradient(1px 1px at 31% 4%, rgba(255,255,255,0.95), transparent),
    radial-gradient(2px 2px at 39% 11%, rgba(200,220,255,0.85), transparent),
    radial-gradient(1px 1px at 47% 19%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1.5px 1.5px at 54% 8%, rgba(255,235,200,0.9), transparent),
    radial-gradient(1px 1px at 62% 14%, rgba(255,255,255,0.75), transparent),

}

@keyframes twinkle {

/* === Moon === */
.moon {

  top: 8%;
  right: 11%;

  height: 95px;

    radial-gradient(circle at 30% 30%,

@keyframes fogDrift {

/* === Pyramids (futuristic silhouettes) === */

}

/* === Caustics (underwater light) === */
.caustics {
  top: 72%;
  height: 28%;
  background:
    repeating-linear-gradient(115deg,

      rgba(91, 158, 255, 0.05) 70px,

}

@keyframes causticDrift {

}

/* === Nile (water surface) === */
.nile {
  top: 70%;
  height: 30%;

}

.nile-waves {

  height: 100%;

}

.nile-waves path {

  stroke-linecap: round;
}

.wave-back {

  stroke-width: 1;
  animation: waveSlide1 14s linear infinite;
}

.wave-mid {
  stroke: rgba(77, 208, 225, 0.22);
  stroke-width: 1.2;

}

.wave-front {

  animation: waveSlide3 7s linear infinite;
}

@keyframes waveSlide1 { to { transform: translateX(-200px); } }
@keyframes waveSlide2 { to { transform: translateX(-200px); } }
@keyframes waveSlide3 { to { transform: translateX(-200px); } }

/* === Moon Reflection on Nile === */
.moon-reflection {

  left: 50%;

}

.moon-reflection::before {

    transparent 6px,
    rgba(91, 158, 255, 0.1) 6px,

@keyframes moonShimmer {

/* === Impact Zone === */
.impact-zone {
  top: 69.5%;
  left: 50%;
  width: 700px;
  height: 220px;
  transform: translateX(-50%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease-out;
}

.impact-zone.active { opacity: 1; }

.ripple {
  position: absolute;
  top: 35px;
  left: 50%;
  width: 50px;
  height: 18px;
  border: 1.5px solid rgba(255, 255, 255, 0.7);
  border-radius: 50%;
  transform: translateX(-50%);
  opacity: 0;
}

.impact-zone.active .ripple {
  animation: rippleExpand 3.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.impact-zone.active .ripple:nth-child(2) { animation-delay: 0.25s; }
.impact-zone.active .ripple:nth-child(3) { animation-delay: 0.55s; }

@keyframes rippleExpand {
  0% {
    width: 30px;
    height: 10px;
    opacity: 0;
    border-width: 3px;
    border-color: rgba(255, 255, 255, 0.95);
  }
  12% {
    opacity: 1;
    border-color: rgba(180, 230, 255, 0.9);
  }
  100% {
    width: 640px;
    height: 110px;
    opacity: 0;
    border-width: 0.5px;
    border-color: rgba(91, 158, 255, 0.1);
  }
}

.splash-burst {
  position: absolute;
  top: 30px;
  left: 50%;
  width: 220px;
  height: 220px;
  transform: translate(-50%, -50%) scale(0);
  background: radial-gradient(ellipse 50% 60% at 50% 65%,
    rgba(255, 255, 255, 0.95) 0%,
    rgba(200, 230, 255, 0.6) 30%,
    rgba(91, 158, 255, 0.3) 55%,
    transparent 75%);

  filter: blur(5px);
  opacity: 0;
}

.impact-zone.active .splash-burst {
  animation: splashBurst 1.2s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
}

@keyframes splashBurst {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  15% { opacity: 1; transform: translate(-50%, -55%) scale(1.2); }
  100% { transform: translate(-50%, -75%) scale(2.8); opacity: 0; }
}

.flash {

  top: 30px;
  left: 50%;
  width: 380px;
  height: 380px;
  transform: translate(-50%, -50%) scale(0);

}

.impact-zone.active .flash {

@keyframes flashOut {

/* === Splash Particles === */
.splash-particle {

.coin-wrapper {

.coin-face {

.coin-face::before {

}

.coin-face svg {

  height: 100%;
  filter: drop-shadow(0 0 8px rgba(0, 0, 0, 0.5));
  position: relative;
  z-index: 2;
}

.coin-edge {

@keyframes coinSpin {

.coin-trail {

.bubble {

.ambient-particle {
  position: absolute;
  width: 2px;
  height: 2px;

@keyframes ambientFloat {

  15% { opacity: 0.7; }

}

/* === Light rays from moon === */
.light-rays {
  background:
    linear-gradient(105deg,

      rgba(254, 243, 199, 0.045) 50%,

@keyframes raysShift {

  50% { transform: translateX(25px) scaleY(1.05); opacity: 1; }
}

/* === Header === */
.header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 22px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-mark {
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, rgba(244, 196, 48, 0.18), rgba(244, 196, 48, 0.05));

  padding: 6px;

.brand-mark svg {

}

.brand-text {

.header-meta {

  align-items: center;

.status {
  display: flex;

  gap: 8px;

.status-dot {

@keyframes pulse {

.content {

.description {

  box-shadow:
    0 12px 40px rgba(0, 0, 0, 0.5),
    0 0 60px rgba(91, 158, 255, 0.1),
    inset 0 1px 0 rgba(255, 255, 255, 0.06);
  opacity: 0;
  transform: translateY(20px);
  animation: contentRise 1s 2.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  flex-wrap: wrap;
  justify-content: center;
}

.countdown {
  display: flex;
  align-items: center;
  gap: 14px;
}

.countdown-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
}

.countdown-number {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 22px;
  color: var(--cyan);
  text-shadow: 0 0 18px rgba(0, 229, 255, 0.55);
  min-width: 32px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

.countdown-number.pulse {
  animation: numberPulse 1s ease-out;
}

@keyframes numberPulse {
  0% { transform: scale(1.25); color: #fff; text-shadow: 0 0 30px rgba(255, 255, 255, 0.8); }
  100% { transform: scale(1); color: var(--cyan); text-shadow: 0 0 18px rgba(0, 229, 255, 0.55); }
}

.divider {
  width: 1px;
  height: 36px;
  background: linear-gradient(180deg, transparent, var(--border-strong), transparent);
}

.return-button {
  position: relative;
  padding: 12px 26px;
  background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 45%, var(--gold-deep) 100%);
  color: #1a0f00;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border: none;
  border-radius: 100px;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
  box-shadow:
    0 4px 18px rgba(244, 196, 48, 0.35),
    0 0 30px rgba(244, 196, 48, 0.18),
    inset 0 1px 0 rgba(255, 255, 255, 0.5);
}

.return-button:hover {
  transform: translateY(-2px);
  box-shadow:
    0 8px 28px rgba(244, 196, 48, 0.55),
    0 0 50px rgba(244, 196, 48, 0.35),
    inset 0 1px 0 rgba(255, 255, 255, 0.7);
}

.return-button:active { transform: translateY(0); }

.return-button::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 30%, rgba(255, 255, 255, 0.55) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.7s ease;
}

.return-button:hover::before { transform: translateX(100%); }

/* === Footer === */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 18px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  z-index: 100;
  pointer-events: none;
}

.footer-block { display: flex; align-items: center; gap: 8px; }

.footer-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--cyan);
  opacity: 0.6;
}

/* === Camera Shake === */
.shake {
  animation: shake 0.65s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
  transform-origin: center center;
}

@keyframes shake {
  0%, 100% { transform: translate(0, 0) rotate(0); }
  10% { transform: translate(-5px, 3px) rotate(-0.4deg); }
  20% { transform: translate(6px, -4px) rotate(0.4deg); }
  30% { transform: translate(-7px, 5px) rotate(-0.3deg); }
  40% { transform: translate(5px, -3px) rotate(0.3deg); }
  50% { transform: translate(-4px, 4px) rotate(-0.2deg); }
  60% { transform: translate(3px, -2px) rotate(0.2deg); }
  70% { transform: translate(-2px, 2px) rotate(-0.1deg); }
  80% { transform: translate(1px, -1px) rotate(0.1deg); }
  90% { transform: translate(-1px, 1px) rotate(0); }
}

/* === Vignette === */
.vignette {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 60;
  background: radial-gradient(ellipse at center,
    transparent 35%,
    rgba(0, 0, 0, 0.35) 80%,
    rgba(0, 0, 0, 0.65) 100%);
}

/* === Scanline overlay (subtle) === */
.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 61;
  background: repeating-linear-gradient(0deg,
    transparent 0,
    transparent 2px,
    rgba(255, 255, 255, 0.012) 2px,
    rgba(255, 255, 255, 0.012) 3px);
  mix-blend-mode: overlay;
  opacity: 0.6;
}

/* === Responsive === */
@media (max-width: 768px) {
  .header { padding: 14px 18px; }
  .header-meta { gap: 12px; }
  .network-label { display: none; }
  .brand-text { font-size: 16px; letter-spacing: 3px; }
  .brand-mark { width: 32px; height: 32px; }

  .footer { padding: 12px 18px; font-size: 9px; letter-spacing: 1.5px; }
  .footer-block:nth-child(3) { display: none; }

  .info-panel {
    flex-direction: column;
    gap: 16px;
    padding: 18px 24px;
    border-radius: 24px;
    max-width: 320px;
  }
  .divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--border-strong), transparent); }
  .return-button { width: 100%; }

  .moon { width: 65px; height: 65px; top: 6%; right: 8%; }
  .coin-wrapper { width: 95px; height: 95px; margin-left: -47.5px; margin-top: -47.5px; }
}

@media (max-width: 480px) {
  .error-code { font-size: 7rem; }
  .headline { font-size: 1rem; }
  .description { font-size: 0.85rem; }
  .countdown-label { font-size: 9.5px; }
  .countdown-number { font-size: 19px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* Focus styles */
*:focus-visible {
  outline: 2px solid var(--cyan);
  outline-offset: 4px;
  border-radius: 4px;
}
</style>
</head>

<script>
(function() {
  'use strict';

  // === DOM References ===
  const scene = document.getElementById('scene');
  const sceneWrapper = document.querySelector('.scene-wrapper');
  const coinWrapper = document.getElementById('coinWrapper');
  const impactZone = document.getElementById('impactZone');
  const countdownNumber = document.getElementById('countdownNumber');
  const returnButton = document.getElementById('returnButton');

  // === Animation Timings (ms) ===
  const T = {
    startDelay: 1300,
    fallStart: 1500,
    impact: 3900,
    bubbleStart: 4100,
    postImpact: 4600
  };

  // === Splash Particle System ===
  // Procedurally generate water particles that fly outward with gravity.
  function spawnSplashParticles() {
    const sceneRect = scene.getBoundingClientRect();
    const impactRect = impactZone.getBoundingClientRect();
    const cx = impactRect.left + impactRect.width / 2 - sceneRect.left;
    const cy = impactRect.top + 32 - sceneRect.top; // 32px = waterline within impact zone
    const particleCount = 42;

    for (let i = 0; i < particleCount; i++) {
      const p = document.createElement('div');
      const isLarge = i < 10;
      p.className = 'splash-particle' + (isLarge ? ' large' : '');

      // Angle: distribute around upper hemisphere (splash goes UP and out)
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.15;
      const speed = isLarge ? 220 + Math.random() * 220 : 140 + Math.random() * 240;

      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed; // negative (upward)
      const size = isLarge ? 5 + Math.random() * 6 : 2 + Math.random() * 4;
      const duration = 1.3 + Math.random() * 0.8;

      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = (cx - size / 2) + 'px';
      p.style.top = (cy - size / 2) + 'px';
      p.style.opacity = '1';

      scene.appendChild(p);

      // Animate via WAAPI for 60fps + free GPU interpolation
      const animation = p.animate([
        {
          transform: 'translate(0, 0) scale(1)',
          opacity: 1,
          offset: 0
        },
        {
          transform: `translate(${vx * 0.35}px, ${vy * 0.35}px) scale(0.95)`,
          opacity: 1,
          offset: 0.35
        },
        {
          transform: `translate(${vx}px, ${vy + 200}px) scale(0.5)`,
          opacity: 0,
          offset: 1
        }
      ], {
        duration: duration * 1000,
        easing: 'cubic-bezier(0.25, 0.6, 0.4, 1)',
        fill: 'forwards'
      });

      animation.onfinish = () => p.remove();
    }
  }

  // === Bubble Particle System ===
  // Bubbles rise from the impact point after the coin sinks.
  function spawnBubble() {
    const sceneRect = scene.getBoundingClientRect();
    const impactRect = impactZone.getBoundingClientRect();
    const baseX = impactRect.left + impactRect.width / 2 - sceneRect.left;
    const baseY = impactRect.top + 40 - sceneRect.top;

    const b = document.createElement('div');
    b.className = 'bubble';

    const xOffset = (Math.random() - 0.5) * 110;
    const size = 3 + Math.random() * 9;
    const duration = 2.8 + Math.random() * 2.4;
    const driftX = (Math.random() - 0.5) * 60;
    const riseY = 90 + Math.random() * 70;

    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = (baseX + xOffset - size / 2) + 'px';
    b.style.top = (baseY - size / 2) + 'px';

    scene.appendChild(b);

    const anim = b.animate([
      { transform: 'translate(0, 0) scale(0.3)', opacity: 0, offset: 0 },
      { transform: 'translate(0, -10px) scale(1)', opacity: 0.85, offset: 0.15 },
      { transform: `translate(${driftX * 0.5}px, -${riseY * 0.5}px) scale(1.05)`, opacity: 0.7, offset: 0.5 },
      { transform: `translate(${driftX}px, -${riseY}px) scale(1.15)`, opacity: 0, offset: 1 }
    ], {
      duration: duration * 1000,
      easing: 'cubic-bezier(0.3, 0.2, 0.6, 1)',
      fill: 'forwards'
    });

    anim.onfinish = () => b.remove();
  }

  let bubbleInterval = null;
  function startBubbles() {
    // initial burst
    for (let i = 0; i < 5; i++) {
      setTimeout(spawnBubble, i * 80);
    }
    // continuous rising bubbles
    bubbleInterval = setInterval(() => {
      if (Math.random() < 0.7) spawnBubble();
    }, 320);
  }

  // === Coin Falling Animation ===
  // The coin falls from above the viewport to the Nile waterline,
  // accelerating (easeIn) for a cinematic feel.
  function animateCoin() {
    const fallDistance = window.innerHeight * 0.70 + 70; // top:0 → waterline + a bit

    const fallAnim = coinWrapper.animate([
      {
        transform: 'translate3d(0, -140px, 0) rotate(0deg)',
        opacity: 0,
        offset: 0
      },
      {
        transform: 'translate3d(0, -80px, 0) rotate(60deg)',
        opacity: 1,
        offset: 0.08
      },
      {
        transform: `translate3d(0, ${fallDistance - 60}px, 0) rotate(540deg)`,
        opacity: 1,
        offset: 0.85
      },
      {
        transform: `translate3d(0, ${fallDistance}px, 0) rotate(620deg)`,
        opacity: 0.4,
        offset: 1
      }
    ], {
      duration: T.impact - T.fallStart,
      delay: T.fallStart,
      easing: 'cubic-bezier(0.55, 0.05, 0.85, 0.55)', // accelerating fall
      fill: 'forwards'
    });

    fallAnim.onfinish = () => {
      triggerImpact();
      setTimeout(startBubbles, T.bubbleStart - T.impact);
    };
  }

  // === Impact Sequence ===
  function triggerImpact() {
    // Activate ripple + burst + flash
    impactZone.classList.add('active');

    // Camera shake on the entire scene wrapper
    sceneWrapper.classList.add('shake');

    // Spawn splash particles
    spawnSplashParticles();
    // Slight follow-up splash for richness
    setTimeout(spawnSplashParticles, 120);

    // Cleanup shake class
    setTimeout(() => sceneWrapper.classList.remove('shake'), 700);
  }

  // === Ambient Mist / Dust Particles ===
  // Floating golden dust drifting upward across the scene.
  function spawnAmbientParticle() {
    const p = document.createElement('div');
    p.className = 'ambient-particle';

    const startX = Math.random() * window.innerWidth;
    const startY = window.innerHeight * (0.55 + Math.random() * 0.4);
    const drift = (Math.random() - 0.5) * 80;
    const duration = 14 + Math.random() * 16;
    const size = 1 + Math.random() * 2.5;
    const isGold = Math.random() > 0.4;

    p.style.left = startX + 'px';
    p.style.top = startY + 'px';
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.setProperty('--dx', drift + 'px');
    p.style.animationDuration = duration + 's';
    p.style.background = isGold
      ? 'rgba(244, 196, 48, 0.6)'
      : 'rgba(91, 158, 255, 0.5)';
    p.style.boxShadow = isGold
      ? '0 0 6px rgba(244, 196, 48, 0.5)'
      : '0 0 6px rgba(91, 158, 255, 0.4)';

    scene.appendChild(p);
    setTimeout(() => p.remove(), duration * 1000);
  }

  // === Language & Translation ===
  function applyTranslations() {
    const lang = document.documentElement.dataset.lang || 'en';
    document.querySelectorAll('[data-en][data-ar]').forEach(el => {
      const text = el.dataset[lang];
      if (text) {
        if (el.tagName === 'BUTTON') {
          el.textContent = text;
        } else if (text.includes('<span')) {
          el.innerHTML = text;
        } else {
          el.textContent = text;
        }
      }
    });
    
    // Update page title
    const pageTitle = document.getElementById('pageTitle');
    if (pageTitle) {
      pageTitle.textContent = lang === 'ar' 
        ? '404 — NDOG سقع في النيل' 
        : '404 — NDOG Lost in the Nile';
    }
  }

  // Apply translations on load
  applyTranslations();

  // Language toggle button
  const langToggle = document.getElementById('langToggle');
  if (langToggle) {
    langToggle.addEventListener('click', () => {
      const currentLang = document.documentElement.dataset.lang || 'en';
      const newLang = currentLang === 'ar' ? 'en' : 'ar';
      
      document.documentElement.dataset.lang = newLang;
      document.documentElement.lang = newLang;
      document.documentElement.dir = newLang === 'ar' ? 'rtl' : 'ltr';
      localStorage.setItem('ndog_lang', newLang);
      
      applyTranslations();
    });
  }

  // === Countdown Timer ===
  let countdown = 10;
  function startCountdown() {
    const updateCountdown = () => {
      countdownNumber.textContent = countdown;
      countdownNumber.classList.remove('pulse');
      // force reflow to restart animation
      void countdownNumber.offsetWidth;
      countdownNumber.classList.add('pulse');

      if (countdown <= 0) {
        redirectToHome();
        return;
      }
      countdown--;
      setTimeout(updateCountdown, 1000);
    };

    setTimeout(updateCountdown, T.postImpact);
  }

  // === Redirect ===
  let isRedirecting = false;
  function redirectToHome() {
    if (isRedirecting) return;
    isRedirecting = true;
    // Graceful fade-out
    document.body.style.transition = 'opacity 0.5s ease-out, filter 0.5s ease-out';
    document.body.style.opacity = '0';
    document.body.style.filter = 'blur(4px)';
    setTimeout(() => {
      window.location.href = '/';
    }, 520);
  }

  returnButton.addEventListener('click', redirectToHome);

  // === Parallax (subtle mouse follow) ===
  // Adds depth: foreground / midground / background shift slightly.
  let parallaxRAF = null;
  document.addEventListener('mousemove', (e) => {
    if (parallaxRAF) cancelAnimationFrame(parallaxRAF);
    parallaxRAF = requestAnimationFrame(() => {
      const x = (e.clientX / window.innerWidth - 0.5);
      const y = (e.clientY / window.innerHeight - 0.5);
      // Apply subtle parallax to scene layers
      const moon = document.querySelector('.moon');
      const stars = document.querySelector('.stars-layer');
      const pyramids = document.querySelector('.pyramids');
      if (moon) moon.style.transform = `translate(${x * -12}px, ${y * -8}px) scale(${1 + Math.abs(y) * 0.01})`;
      if (stars) stars.style.transform = `translate(${x * -6}px, ${y * -4}px)`;
      if (pyramids) pyramids.style.transform = `translate(${x * 8}px, 0)`;
    });
  });

  // === Init ===
  function init() {
    // Kick off ambient particles continuously
    for (let i = 0; i < 8; i++) {
      setTimeout(spawnAmbientParticle, i * 200);
    }
    setInterval(spawnAmbientParticle, 900);

    // Kick off coin fall
    setTimeout(animateCoin, T.startDelay);

    // Kick off countdown
    startCountdown();
  }

  // Wait for fonts to be ready for crisp text
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(init);
  } else {
    window.addEventListener('load', init);
  }

  // Safety: if fonts.ready doesn't fire within 1.2s, init anyway
  setTimeout(() => {
    if (!scene.querySelector('.ambient-particle')) init();
  }, 1200);

})();
</script>
