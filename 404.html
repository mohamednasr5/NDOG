<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — الصفحة غير موجودة | NDOG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#050d1a;
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
}

/* ===== STARS BG ===== */
.stars{position:fixed;inset:0;z-index:0;overflow:hidden}
.star{
  position:absolute;border-radius:50%;
  background:#fff;animation:twinkle var(--d) ease-in-out infinite;
  opacity:0;
}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:var(--op);transform:scale(1)}}

/* ===== WATER ===== */
.water-wrap{
  position:fixed;bottom:0;left:0;right:0;height:220px;z-index:1;overflow:hidden;
}
.water{
  position:absolute;bottom:0;left:-10%;width:120%;height:100%;
  background:linear-gradient(180deg,rgba(0,150,255,.0) 0%,rgba(0,100,220,.5) 30%,rgba(0,60,180,.85) 100%);
}
.wave{
  position:absolute;width:200%;left:-50%;
  animation:waveMove var(--spd) linear infinite;
  opacity:.7;
}
.wave svg{width:100%;height:auto;display:block}
.wave1{top:-30px;--spd:6s;animation-direction:normal}
.wave2{top:-50px;--spd:9s;animation-direction:reverse;opacity:.4}
.wave3{top:-20px;--spd:12s;opacity:.3}
@keyframes waveMove{0%{transform:translateX(0)}100%{transform:translateX(50%)}}

/* ===== RIPPLES ===== */
.ripple-container{position:fixed;bottom:160px;left:50%;transform:translateX(-50%);z-index:5;pointer-events:none}
.ripple{
  position:absolute;border-radius:50%;
  border:2px solid rgba(0,180,255,.7);
  transform:translate(-50%,-50%) scale(0);
  opacity:0;
  animation:rippleAnim 1.8s ease-out forwards;
}
@keyframes rippleAnim{
  0%{transform:translate(-50%,-50%) scale(0);opacity:.9}
  100%{transform:translate(-50%,-50%) scale(8);opacity:0}
}

/* ===== BUBBLES ===== */
.bubble{
  position:fixed;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.6),rgba(100,200,255,.2));
  border:1px solid rgba(255,255,255,.3);
  animation:bubbleRise var(--bd) ease-in forwards;
  z-index:6;opacity:0;
}
@keyframes bubbleRise{
  0%{transform:translateY(0) translateX(0);opacity:.8}
  50%{opacity:.6;transform:translateY(calc(var(--bh)*-.5)) translateX(var(--bx))}
  100%{transform:translateY(calc(var(--bh)*-1)) translateX(var(--bx2));opacity:0}
}

/* ===== SPLASH DROPS ===== */
.splash-drop{
  position:fixed;border-radius:50%;
  background:radial-gradient(circle,rgba(100,220,255,.9),rgba(0,150,255,.3));
  animation:dropFly var(--dd) ease-out forwards;
  z-index:7;
}
@keyframes dropFly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
}

/* ===== COIN ===== */
.coin-wrap{
  position:fixed;top:-120px;left:50%;transform:translateX(-50%);
  z-index:10;
  animation:coinFall 1.4s cubic-bezier(.4,0,.8,1.2) forwards;
}
@keyframes coinFall{
  0%{top:-120px;transform:translateX(-50%) rotate(0deg)}
  70%{top:calc(100vh - 290px);transform:translateX(-50%) rotate(540deg)}
  80%{top:calc(100vh - 310px);transform:translateX(-50%) rotate(580deg)}
  90%{top:calc(100vh - 280px);transform:translateX(-50%) rotate(600deg)}
  100%{top:calc(100vh - 295px);transform:translateX(-50%) rotate(720deg)}
}

.coin{
  width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#ffe066,#f59e0b 40%,#b45309 80%,#78350f);
  box-shadow:
    0 0 0 5px #d97706,
    0 0 0 8px #b45309,
    0 8px 30px rgba(245,158,11,.6),
    inset 0 -8px 20px rgba(0,0,0,.4),
    inset 0 8px 20px rgba(255,240,100,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:42px;
  position:relative;
  animation:coinSpin 0.3s linear infinite;
  filter:drop-shadow(0 0 20px rgba(245,158,11,.8));
}
@keyframes coinSpin{
  0%{transform:rotateY(0deg)}
  100%{transform:rotateY(360deg)}
}
.coin-shine{
  position:absolute;width:30px;height:70px;
  background:linear-gradient(135deg,rgba(255,255,255,.7),transparent);
  border-radius:50%;top:8px;right:18px;transform:rotate(-20deg);
  animation:shineMove 2s ease-in-out infinite;
}
@keyframes shineMove{0%,100%{opacity:.7}50%{opacity:.2}}

/* Hide coin after splash */
.coin-wrap.splashed{animation:coinSink .3s ease-in forwards}
@keyframes coinSink{
  0%{opacity:1;transform:translateX(-50%) scale(1)}
  100%{opacity:0;transform:translateX(-50%) scale(.3) translateY(40px)}
}

/* ===== WATER IMPACT FLASH ===== */
.impact-flash{
  position:fixed;bottom:150px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-radius:50%;
  background:radial-gradient(circle,rgba(180,230,255,1),rgba(0,150,255,0));
  z-index:8;opacity:0;
  animation:none;
}
.impact-flash.active{
  animation:flashBurst .5s ease-out forwards;
}
@keyframes flashBurst{
  0%{width:0;height:0;opacity:1;transform:translateX(-50%) translateY(0)}
  60%{width:300px;height:120px;opacity:.8;transform:translateX(-50%) translateY(-20px)}
  100%{width:400px;height:160px;opacity:0;transform:translateX(-50%) translateY(-40px)}
}

/* ===== WATER COLUMNS ===== */
.water-col{
  position:fixed;bottom:155px;left:50%;
  width:8px;height:0;
  background:linear-gradient(180deg,rgba(180,230,255,0),rgba(100,200,255,.9));
  border-radius:4px;opacity:0;
  animation:none;
  z-index:8;
}
.water-col.active{animation:colRise .6s ease-out forwards}
@keyframes colRise{
  0%{height:0;opacity:1;transform:translateX(var(--cx)) scaleX(1)}
  60%{height:80px;opacity:.9}
  100%{height:120px;opacity:0;transform:translateX(var(--cx)) scaleX(.5)}
}

/* ===== CONTENT ===== */
.content{
  position:relative;z-index:20;text-align:center;
  padding:20px;
  animation:contentIn .8s ease 2.2s both;
}
@keyframes contentIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.err-code{
  font-size:clamp(80px,18vw,160px);font-weight:900;
  background:linear-gradient(135deg,#f59e0b,#ef4444,#8b5cf6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;letter-spacing:-4px;
  filter:drop-shadow(0 0 40px rgba(245,158,11,.4));
  animation:errPulse 3s ease-in-out infinite 3s;
}
@keyframes errPulse{0%,100%{filter:drop-shadow(0 0 40px rgba(245,158,11,.4))}50%{filter:drop-shadow(0 0 70px rgba(245,158,11,.8))}}

.err-title{
  font-size:clamp(18px,4vw,28px);font-weight:700;color:#e2e8f0;
  margin:12px 0 8px;
}
.err-sub{font-size:clamp(13px,2.5vw,16px);color:#64748b;margin-bottom:32px;line-height:1.7}

.countdown-wrap{
  display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:28px;
}
.countdown-ring{position:relative;width:64px;height:64px}
.countdown-ring svg{transform:rotate(-90deg)}
.countdown-ring circle{transition:stroke-dashoffset .9s linear;stroke-linecap:round}
.countdown-num{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;color:#f59e0b;
}
.countdown-text{font-size:14px;color:#94a3b8}

.btn-home{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 32px;border-radius:12px;
  background:linear-gradient(135deg,#f59e0b,#d97706);
  color:#000;font-size:15px;font-weight:700;
  text-decoration:none;border:none;cursor:pointer;
  transition:.2s;font-family:inherit;
  box-shadow:0 4px 20px rgba(245,158,11,.4);
}
.btn-home:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(245,158,11,.6)}

/* ===== FOAM ===== */
.foam{
  position:fixed;bottom:190px;left:50%;transform:translateX(-50%);
  z-index:6;display:flex;gap:4px;opacity:0;
}
.foam-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(200,240,255,.8);
  animation:foamFloat var(--fd) ease-out forwards;
}
@keyframes foamFloat{
  0%{transform:translateY(0) translateX(0);opacity:.9}
  100%{transform:translateY(-30px) translateX(var(--fx));opacity:0}
}

/* ===== LOGO ===== */
.ndog-logo{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  font-size:14px;font-weight:700;color:rgba(245,158,11,.6);
  letter-spacing:3px;z-index:20;
  animation:contentIn .5s ease .5s both;
}
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Logo -->
<div class="ndog-logo">🐕 NDOG</div>

<!-- Water -->
<div class="water-wrap">
  <div class="water">
    <div class="wave wave1">
      <svg viewBox="0 0 1440 80" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,40 C240,80 480,0 720,40 C960,80 1200,0 1440,40 L1440,80 L0,80 Z" fill="rgba(0,120,255,0.4)"/>
      </svg>
    </div>
    <div class="wave wave2">
      <svg viewBox="0 0 1440 80" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,50 C200,10 400,70 720,30 C960,0 1200,60 1440,30 L1440,80 L0,80 Z" fill="rgba(0,100,220,0.3)"/>
      </svg>
    </div>
    <div class="wave wave3">
      <svg viewBox="0 0 1440 80" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,30 C300,70 600,10 900,50 C1100,75 1300,20 1440,50 L1440,80 L0,80 Z" fill="rgba(0,80,200,0.25)"/>
      </svg>
    </div>
  </div>
</div>

<!-- Ripple container -->
<div class="ripple-container" id="rippleContainer"></div>

<!-- Water impact flash -->
<div class="impact-flash" id="impactFlash"></div>

<!-- Water columns (splash) -->
<div class="water-col" id="wCol1" style="--cx:-60px"></div>
<div class="water-col" id="wCol2" style="--cx:-30px"></div>
<div class="water-col" id="wCol3" style="--cx:0px"></div>
<div class="water-col" id="wCol4" style="--cx:30px"></div>
<div class="water-col" id="wCol5" style="--cx:60px"></div>

<!-- Foam -->
<div class="foam" id="foam"></div>

<!-- Coin -->
<div class="coin-wrap" id="coinWrap">
  <div class="coin" id="coin">
    🐕
    <div class="coin-shine"></div>
  </div>
</div>

<!-- Content -->
<div class="content">
  <div class="err-code">404</div>
  <div class="err-title">عُملتك ضاعت في البحر! 🌊</div>
  <div class="err-sub">
    الصفحة التي تبحث عنها غرقت مع العملة...<br/>
    لكن لا تقلق، سنعيدك للشاطئ الآمن
  </div>

  <div class="countdown-wrap">
    <div class="countdown-ring">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="27" fill="none" stroke="rgba(245,158,11,0.15)" stroke-width="5"/>
        <circle id="progressCircle" cx="32" cy="32" r="27" fill="none"
          stroke="#f59e0b" stroke-width="5"
          stroke-dasharray="169.6"
          stroke-dashoffset="0"/>
      </svg>
      <div class="countdown-num" id="countNum">10</div>
    </div>
    <div class="countdown-text">ثوانٍ حتى<br/>العودة للرئيسية</div>
  </div>

  <a href="index.html" class="btn-home">
    🏠 العودة الآن
  </a>
</div>

<script>
// ===== STARS =====
(function(){
  const s = document.getElementById("stars");
  for(let i=0;i<120;i++){
    const d = document.createElement("div");
    d.className = "star";
    const size = Math.random()*2.5+0.5;
    d.style.cssText = `
      width:${size}px;height:${size}px;
      top:${Math.random()*100}%;left:${Math.random()*100}%;
      --d:${Math.random()*4+2}s;
      --op:${Math.random()*0.7+0.2};
      animation-delay:${Math.random()*5}s
    `;
    s.appendChild(d);
  }
})();

// ===== AUDIO ENGINE =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getACtx(){
  if(!actx) actx = new AudioCtx();
  return actx;
}

function playSplash(){
  const ctx = getACtx();
  // White noise burst for splash
  const bufSize = ctx.sampleRate * 0.6;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1) * Math.pow(1-i/bufSize,2);

  const src = ctx.createBufferSource();
  src.buffer = buf;

  const bpf = ctx.createBiquadFilter();
  bpf.type = "bandpass";
  bpf.frequency.value = 800;
  bpf.Q.value = 0.5;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(1.2, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.6);

  const lpf = ctx.createBiquadFilter();
  lpf.type = "lowpass";
  lpf.frequency.value = 2000;

  src.connect(bpf); bpf.connect(lpf); lpf.connect(gain); gain.connect(ctx.destination);
  src.start();

  // Bubbling sound sequence
  for(let i=0;i<12;i++){
    const osc = ctx.createOscillator();
    const og = ctx.createGain();
    const t = ctx.currentTime + 0.15 + i*0.08 + Math.random()*0.05;
    osc.type = "sine";
    osc.frequency.setValueAtTime(300+Math.random()*400, t);
    osc.frequency.exponentialRampToValueAtTime(100+Math.random()*100, t+0.15);
    og.gain.setValueAtTime(0.15+Math.random()*0.1, t);
    og.gain.exponentialRampToValueAtTime(0.001, t+0.15);
    osc.connect(og); og.connect(ctx.destination);
    osc.start(t); osc.stop(t+0.2);
  }

  // Deep thud
  const osc2 = ctx.createOscillator();
  const g2 = ctx.createGain();
  osc2.type = "sine";
  osc2.frequency.setValueAtTime(80, ctx.currentTime);
  osc2.frequency.exponentialRampToValueAtTime(30, ctx.currentTime+0.3);
  g2.gain.setValueAtTime(0.6, ctx.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.3);
  osc2.connect(g2); g2.connect(ctx.destination);
  osc2.start(); osc2.stop(ctx.currentTime+0.35);
}

function playCoinFall(){
  const ctx = getACtx();
  // Coin whistling through air
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(1200, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime+1.2);
  g.gain.setValueAtTime(0.05, ctx.currentTime);
  g.gain.setValueAtTime(0.12, ctx.currentTime+0.3);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+1.2);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime+1.3);
}

function playBubbles(){
  const ctx = getACtx();
  for(let i=0;i<20;i++){
    const osc = ctx.createOscillator();
    const og = ctx.createGain();
    const t = ctx.currentTime + Math.random()*2.5;
    osc.type = "sine";
    const freq = 200+Math.random()*600;
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq*0.4, t+0.2);
    og.gain.setValueAtTime(0.04+Math.random()*0.04, t);
    og.gain.exponentialRampToValueAtTime(0.001, t+0.2);
    osc.connect(og); og.connect(ctx.destination);
    osc.start(t); osc.stop(t+0.25);
  }
}

// ===== SPLASH EFFECTS =====
function triggerSplash(){
  // Flash
  const flash = document.getElementById("impactFlash");
  flash.classList.add("active");

  // Water columns
  ["wCol1","wCol2","wCol3","wCol4","wCol5"].forEach((id,i)=>{
    const el = document.getElementById(id);
    el.style.animation = "none";
    el.offsetHeight; // reflow
    el.style.animationDelay = (i*0.05)+"s";
    el.classList.add("active");
    setTimeout(()=>el.classList.remove("active"), 900);
  });

  // Ripples
  const container = document.getElementById("rippleContainer");
  for(let i=0;i<5;i++){
    setTimeout(()=>{
      const r = document.createElement("div");
      r.className = "ripple";
      r.style.cssText = `
        width:${40+i*20}px;height:${40+i*20}px;
        animation-delay:${i*0.18}s;
        border-color:rgba(0,${160+i*10},255,${0.8-i*0.12});
        border-width:${3-i*0.4}px;
      `;
      container.appendChild(r);
      setTimeout(()=>r.remove(), 2000);
    }, i*100);
  }

  // Splash drops
  const cx = window.innerWidth/2;
  const cy = window.innerHeight - 195;
  for(let i=0;i<20;i++){
    const drop = document.createElement("div");
    drop.className = "splash-drop";
    const angle = (Math.random()*180-90) * Math.PI/180;
    const dist = 40+Math.random()*140;
    const dx = Math.sin(angle)*dist;
    const dy = -(30+Math.random()*120);
    const size = 3+Math.random()*8;
    const dur = 0.4+Math.random()*0.6;
    drop.style.cssText = `
      width:${size}px;height:${size}px;
      left:${cx-size/2}px;top:${cy}px;
      --dx:${dx}px;--dy:${dy}px;
      --dd:${dur}s;
      animation-timing-function:cubic-bezier(.2,.8,.4,1);
    `;
    document.body.appendChild(drop);
    setTimeout(()=>drop.remove(), dur*1000+100);
  }

  // Foam dots
  const foam = document.getElementById("foam");
  foam.innerHTML = "";
  foam.style.opacity = "1";
  for(let i=0;i<14;i++){
    const dot = document.createElement("div");
    dot.className = "foam-dot";
    const dur = 0.6+Math.random()*1.2;
    const fx = (Math.random()*80-40)+"px";
    dot.style.cssText = `--fd:${dur}s;--fx:${fx};animation-delay:${Math.random()*0.3}s`;
    foam.appendChild(dot);
  }
  setTimeout(()=>{foam.style.opacity="0"; foam.innerHTML="";}, 2000);

  // Bubbles rising
  const cx2 = window.innerWidth/2;
  const cy2 = window.innerHeight - 180;
  for(let i=0;i<18;i++){
    const b = document.createElement("div");
    b.className = "bubble";
    const size = 5+Math.random()*18;
    const bh = 80+Math.random()*150;
    const dur = 0.8+Math.random()*2;
    const bx = (Math.random()*100-50)+"px";
    const bx2 = (Math.random()*120-60)+"px";
    b.style.cssText = `
      width:${size}px;height:${size}px;
      left:${cx2-size/2+(Math.random()*60-30)}px;
      top:${cy2}px;
      --bd:${dur}s;--bh:${bh}px;--bx:${bx};--bx2:${bx2};
      animation-delay:${Math.random()*0.5}s
    `;
    document.body.appendChild(b);
    setTimeout(()=>b.remove(), (dur+0.8)*1000);
  }

  // Coin sink
  const coinWrap = document.getElementById("coinWrap");
  coinWrap.classList.add("splashed");

  // Sounds
  playSplash();
  playBubbles();
}

// ===== INIT =====
window.addEventListener("DOMContentLoaded", ()=>{
  // Play coin fall sound immediately
  playCoinFall();

  // Trigger splash when coin hits water (~1.4s)
  setTimeout(triggerSplash, 1400);

  // ===== COUNTDOWN =====
  const totalSecs = 10;
  const circumference = 2 * Math.PI * 27; // 169.6
  const circle = document.getElementById("progressCircle");
  const numEl = document.getElementById("countNum");
  let remaining = totalSecs;

  circle.style.strokeDashoffset = "0";

  const tick = setInterval(()=>{
    remaining--;
    if(remaining <= 0){
      clearInterval(tick);
      window.location.href = "index.html";
      return;
    }
    numEl.textContent = remaining;
    const pct = 1 - (remaining / totalSecs);
    circle.style.strokeDashoffset = (circumference * pct).toFixed(2);
  }, 1000);
});
</script>
</body>
</html>
