<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>404 – الصفحة غير موجودة | NileDogs</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" href="./assets/icons/favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1f44;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      background: rgba(10,31,68,0.6);
      backdrop-filter: blur(12px);
      padding: 40px 50px;
      border-radius: 32px;
      border: 1px solid rgba(255,215,0,0.3);
      max-width: 600px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }
    .content .coin {
      font-size: 80px;
      display: block;
      animation: drop 2s ease-in forwards;
      margin-bottom: 10px;
    }
    @keyframes drop {
      0% { transform: translateY(-200px) rotate(0deg); opacity: 0; }
      60% { transform: translateY(20px) rotate(720deg); opacity: 1; }
      100% { transform: translateY(0) rotate(720deg); }
    }
    h1 {
      font-size: 48px;
      background: linear-gradient(135deg, #ffd700, #f0a500);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 10px 0;
    }
    p {
      font-size: 18px;
      color: #b0c4de;
      line-height: 1.6;
    }
    .timer {
      margin-top: 20px;
      font-size: 14px;
      color: #ffd700;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 32px;
      background: linear-gradient(135deg, #ffd700, #f0a500);
      color: #0a1f44;
      font-weight: 700;
      border-radius: 40px;
      text-decoration: none;
      font-size: 16px;
      transition: transform 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn:hover { transform: scale(1.05); }
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,215,0,0.15);
      border: 2px solid rgba(255,215,0,0.3);
      animation: rippleAnim 3s ease-out infinite;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      0% { width: 20px; height: 20px; opacity: 1; }
      100% { width: 400px; height: 400px; opacity: 0; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="content">
    <span class="coin">🪙</span>
    <h1>404</h1>
    <p>يبدو أن العملة سقطت في النيل…<br />الصفحة التي تبحث عنها غير موجودة.</p>
    <div class="timer">سيتم تحويلك إلى <strong>ndogcoin.com</strong> خلال <span id="countdown">10</span> ثوانٍ</div>
    <a href="./" class="btn">العودة إلى البداية</a>
  </div>

  <script>
    // Canvas with particles and ripples
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Generate particles (water drops)
    for (let i = 0; i < 60; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 3 + 1,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4 + 0.1,
        life: Math.random() * 100 + 50
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      // Water gradient
      const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
      grad.addColorStop(0, '#0a1f44');
      grad.addColorStop(1, '#05102a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Particles
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > W) p.vx *= -1;
        if (p.y < 0 || p.y > H) { p.y = 0; p.vy = Math.random() * 0.2 + 0.1; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,215,0,${0.2 + Math.sin(p.life)*0.1})`;
        ctx.fill();
        p.life += 0.02;
      });

      // Ripples (animated)
      const time = Date.now() / 1000;
      for (let i = 0; i < 3; i++) {
        const phase = time * 0.5 + i * 2.1;
        const cx = W * 0.5 + Math.sin(phase) * 80;
        const cy = H * 0.6 + Math.cos(phase * 0.7) * 40;
        const r = 20 + Math.sin(phase * 0.8) * 15 + 30;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,215,0,${0.15 + Math.sin(phase)*0.05})`;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, r * 1.6, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,215,0,${0.08 + Math.sin(phase+1)*0.04})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      requestAnimationFrame(draw);
    }
    draw();

    // Countdown redirect
    let seconds = 10;
    const cdEl = document.getElementById('countdown');
    const interval = setInterval(() => {
      seconds--;
      cdEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = 'https://ndogcoin.com/';
      }
    }, 1000);
  </script>
</body>
</html>
