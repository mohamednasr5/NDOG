<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>لوحة تحكم المسؤول | NileDogs</title>
  <link rel="icon" href="./assets/icons/favicon.png" />
  <link rel="stylesheet" href="./css/styles.css?v=2.0.5" />
  <link rel="stylesheet" href="./css/admin.css?v=2.0.5" />
  <link rel="stylesheet" href="./css/animations.css?v=2.0.5" />
  <link rel="stylesheet" href="./css/responsive.css?v=2.0.5" />
  <style>
    .admin-wrap { padding: 20px; max-width: 1400px; margin: 0 auto; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .admin-header h1 { font-size: 28px; background: linear-gradient(135deg, #ffd700, #f0a500); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .admin-card { background: rgba(10,31,68,0.7); backdrop-filter: blur(18px); border: 1px solid rgba(255,215,0,0.2); border-radius: 20px; padding: 20px; }
    .admin-card h3 { color: #ffd700; margin-bottom: 12px; }
    .admin-card .stat { font-size: 32px; font-weight: 700; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .admin-table th { text-align: right; padding: 10px; border-bottom: 1px solid rgba(255,215,0,0.2); color: #ffd700; }
    .admin-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; }
    .badge-admin { background: #ffd700; color: #0a1f44; }
    .badge-user { background: #2a3f6a; color: #b0c4de; }
    .btn-sm { padding: 4px 12px; border-radius: 20px; font-size: 12px; border: none; cursor: pointer; }
    .btn-ban { background: #e74c3c; color: #fff; }
    .btn-unban { background: #2ecc71; color: #fff; }
    .btn-edit { background: #3498db; color: #fff; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 8px 20px; border-radius: 30px; background: rgba(255,255,255,0.05); cursor: pointer; border: 1px solid transparent; }
    .tab.active { border-color: #ffd700; background: rgba(255,215,0,0.1); color: #ffd700; }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-header">
      <h1>🛡️ لوحة المسؤول</h1>
      <div>
        <span id="adminUser" style="margin-left:16px;">مرحباً، <strong id="adminName"></strong></span>
        <button class="btn btn--ghost" id="adminLogout">تسجيل الخروج</button>
        <a href="./" class="btn btn--ghost" style="margin-right:8px;">← العودة للتطبيق</a>
      </div>
    </div>

    <div class="tabs" id="adminTabs">
      <button class="tab active" data-tab="users">👥 المستخدمون</button>
      <button class="tab" data-tab="missions">🎯 المهام</button>
      <button class="tab" data-tab="referrals">👥 الإحالات</button>
      <button class="tab" data-tab="news">📰 الأخبار</button>
      <button class="tab" data-tab="fraud">🚨 سجل الاحتيال</button>
      <button class="tab" data-tab="analytics">📊 الإحصائيات</button>
    </div>

    <div id="adminContent">
      <!-- سيتم ملء المحتوى بواسطة JavaScript -->
      <div class="admin-grid" id="usersGrid"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
    import { getDatabase, ref, get, set, update, remove, onValue, query, orderByChild, equalTo } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAwvOJCX4qSAtqcF_fcnHtQgsTArnIrrhc",
      authDomain: "ndog-a3265.firebaseapp.com",
      databaseURL: "https://ndog-a3265-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "ndog-a3265",
      storageBucket: "ndog-a3265.firebasestorage.app",
      messagingSenderId: "829364393352",
      appId: "1:829364393352:web:82d0d0a99a3b3f2200163d"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // التحقق من صلاحية المسؤول
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = './';
        return;
      }
      // التحقق من الدور
      const snap = await get(ref(db, `users/${user.uid}`));
      const data = snap.val();
      if (!data || (data.role !== 'admin' && data.role !== 'superadmin')) {
        alert('ليس لديك صلاحية للوصول إلى لوحة المسؤول.');
        window.location.href = './';
        return;
      }
      document.getElementById('adminName').textContent = data.displayName || user.displayName;
      // تحميل البيانات
      loadUsers();
      loadAnalytics();
    });

    // تسجيل الخروج
    document.getElementById('adminLogout').addEventListener('click', () => {
      signOut(auth);
      window.location.href = './';
    });

    // تبديل التبويبات
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const tabName = tab.dataset.tab;
        if (tabName === 'users') loadUsers();
        else if (tabName === 'analytics') loadAnalytics();
        else if (tabName === 'fraud') loadFraudLogs();
        else if (tabName === 'news') loadNews();
        else if (tabName === 'missions') loadMissions();
        else if (tabName === 'referrals') loadReferrals();
      });
    });

    async function loadUsers() {
      const snap = await get(ref(db, 'users'));
      const users = snap.val() || {};
      const html = Object.entries(users).map(([uid, u]) => `
        <div class="admin-card">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
              <strong>${u.displayName || 'مجهول'}</strong>
              <div style="font-size:12px;color:#b0c4de;">${u.email || ''}</div>
              <div style="font-size:12px;">الرصيد: ${u.balance || 0} NDOG</div>
              <div style="font-size:12px;">الإحالات: ${u.totalReferrals || 0}</div>
            </div>
            <div>
              <span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">${u.role || 'user'}</span>
              <div style="margin-top:8px;">
                <button class="btn-sm btn-ban" data-uid="${uid}" data-action="ban">حظر</button>
                <button class="btn-sm btn-unban" data-uid="${uid}" data-action="unban">إلغاء الحظر</button>
                <button class="btn-sm btn-edit" data-uid="${uid}" data-action="edit">تعديل</button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
      document.getElementById('usersGrid').innerHTML = html;
    }

    async function loadAnalytics() {
      const snap = await get(ref(db, 'analytics'));
      const data = snap.val() || {};
      document.getElementById('usersGrid').innerHTML = `
        <div class="admin-card"><h3>إجمالي المستخدمين</h3><div class="stat">${data.totalUsers || 0}</div></div>
        <div class="admin-card"><h3>إجمالي المطالبات</h3><div class="stat">${data.totalClaims || 0}</div></div>
        <div class="admin-card"><h3>إجمالي الإحالات</h3><div class="stat">${data.totalReferrals || 0}</div></div>
        <div class="admin-card"><h3>إجمالي NDOG الموزع</h3><div class="stat">${data.totalDistributed || 0}</div></div>
      `;
    }

    async function loadFraudLogs() {
      const snap = await get(ref(db, 'fraudLogs'));
      const logs = snap.val() || {};
      const html = Object.entries(logs).map(([key, log]) => `
        <div class="admin-card"><pre style="font-size:12px;">${JSON.stringify(log, null, 2)}</pre></div>
      `).join('');
      document.getElementById('usersGrid').innerHTML = html || '<div class="admin-card">لا توجد سجلات احتيال.</div>';
    }

    async function loadNews() {
      const snap = await get(ref(db, 'news'));
      const news = snap.val() || {};
      const html = Object.entries(news).map(([key, n]) => `
        <div class="admin-card"><h3>${n.title}</h3><p>${n.body}</p><small>${n.date}</small></div>
      `).join('');
      document.getElementById('usersGrid').innerHTML = html || '<div class="admin-card">لا توجد أخبار.</div>';
    }

    async function loadMissions() {
      const snap = await get(ref(db, 'missions'));
      const missions = snap.val() || {};
      const html = Object.entries(missions).map(([key, m]) => `
        <div class="admin-card"><h3>${m.name}</h3><p>${m.desc}</p><span class="badge badge-admin">${m.type}</span></div>
      `).join('');
      document.getElementById('usersGrid').innerHTML = html || '<div class="admin-card">لا توجد مهام.</div>';
    }

    async function loadReferrals() {
      const snap = await get(ref(db, 'referrals'));
      const refs = snap.val() || {};
      const html = Object.entries(refs).slice(0, 50).map(([key, r]) => `
        <div class="admin-card"><pre style="font-size:12px;">${JSON.stringify(r, null, 2)}</pre></div>
      `).join('');
      document.getElementById('usersGrid').innerHTML = html || '<div class="admin-card">لا توجد إحالات.</div>';
    }
  </script>
</body>
</html>
