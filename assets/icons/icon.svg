<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1f44"/>
      <stop offset="1" stop-color="#00132a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd700"/>
      <stop offset="1" stop-color="#ffb347"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#1e90ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1e90ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <rect width="512" height="512" rx="120" fill="url(#glow)"/>
  <rect x="8" y="8" width="496" height="496" rx="116" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.7"/>
  <!-- Stylized dog head silhouette -->
  <g transform="translate(256 270)" fill="url(#gold)">
    <!-- ears -->
    <path d="M-120,-90 L-90,-180 L-40,-110 Z"/>
    <path d="M 120,-90 L  90,-180 L  40,-110 Z"/>
    <!-- head -->
    <ellipse cx="0" cy="0" rx="120" ry="100"/>
    <!-- snout -->
    <ellipse cx="0" cy="55" rx="55" ry="40" fill="#ffe9a8"/>
    <!-- nose -->
    <ellipse cx="0" cy="35" rx="14" ry="9" fill="#1a1a1a"/>
    <!-- eyes -->
    <circle cx="-45" cy="-20" r="11" fill="#0a1f44"/>
    <circle cx=" 45" cy="-20" r="11" fill="#0a1f44"/>
    <circle cx="-42" cy="-23" r="3.5" fill="#ffffff"/>
    <circle cx=" 48" cy="-23" r="3.5" fill="#ffffff"/>
  </g>
  <!-- NDOG text -->
  <text x="256" y="445" text-anchor="middle"
        font-family="'Arial Black', Helvetica, sans-serif"
        font-size="78" font-weight="900"
        fill="url(#gold)" letter-spacing="6">NDOG</text>
</svg>
