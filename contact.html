<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>اتصل بنا | NileDogs</title>
  <link rel="icon" href="./assets/icons/favicon.png" />
  <link rel="stylesheet" href="./css/styles.css?v=2.0.5" />
  <style>
    .page-wrap { max-width: 600px; margin: 80px auto 40px; padding: 0 20px; }
    .card { background: rgba(10,31,68,0.7); backdrop-filter: blur(18px); border: 1px solid rgba(255,215,0,0.2); border-radius: 24px; padding: 30px; }
    .card h1 { color: #ffd700; }
    input, textarea { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,215,0,0.2); border-radius: 12px; color: #fff; margin-bottom: 12px; }
    .btn-submit { background: linear-gradient(135deg, #ffd700, #f0a500); color: #0a1f44; border: none; padding: 12px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="card">
      <h1>📩 اتصل بنا</h1>
      <p>سنرد عليك خلال 24 ساعة.</p>
      <form id="contactForm">
        <input type="text" id="contactName" placeholder="الاسم" required />
        <input type="email" id="contactEmail" placeholder="البريد الإلكتروني" required />
        <textarea id="contactMsg" rows="5" placeholder="رسالتك..." required></textarea>
        <button type="submit" class="btn-submit">إرسال</button>
      </form>
      <p style="margin-top:20px;"><a href="./" class="btn btn--ghost">← العودة للتطبيق</a></p>
    </div>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    import { getDatabase, ref, push } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';
    const firebaseConfig = {
      apiKey: "AIzaSyAwvOJCX4qSAtqcF_fcnHtQgsTArnIrrhc",
      authDomain: "ndog-a3265.firebaseapp.com",
      databaseURL: "https://ndog-a3265-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "ndog-a3265",
      storageBucket: "ndog-a3265.firebasestorage.app",
      messagingSenderId: "829364393352",
      appId: "1:829364393352:web:82d0d0a99a3b3f2200163d"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    document.getElementById('contactForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('contactName').value;
      const email = document.getElementById('contactEmail').value;
      const msg = document.getElementById('contactMsg').value;
      push(ref(db, 'contacts'), { name, email, msg, date: Date.now() });
      alert('تم إرسال رسالتك بنجاح!');
      e.target.reset();
    });
  </script>
</body>
</html>
