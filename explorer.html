<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>المستكشف | NileDogs</title>
  <link rel="icon" href="./assets/icons/favicon.png" />
  <link rel="stylesheet" href="./css/styles.css?v=2.0.5" />
  <style>
    .page-wrap { max-width: 800px; margin: 80px auto 40px; padding: 0 20px; }
    .tx { background: rgba(10,31,68,0.7); backdrop-filter: blur(18px); border: 1px solid rgba(255,215,0,0.2); border-radius: 16px; padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; }
    .tx .hash { color: #ffd700; font-family: monospace; }
    .tx .amount { color: #2ecc71; }
  </style>
</head>
<body>
  <div class="page-wrap">
    <h1 style="color:#ffd700;">🔍 مستكشف المعاملات</h1>
    <div id="txList"></div>
    <p style="margin-top:20px;"><a href="./" class="btn btn--ghost">← العودة للتطبيق</a></p>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';
    const firebaseConfig = {
      apiKey: "AIzaSyAwvOJCX4qSAtqcF_fcnHtQgsTArnIrrhc",
      authDomain: "ndog-a3265.firebaseapp.com",
      databaseURL: "https://ndog-a3265-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "ndog-a3265",
      storageBucket: "ndog-a3265.firebasestorage.app",
      messagingSenderId: "829364393352",
      appId: "1:829364393352:web:82d0d0a99a3b3f2200163d"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const list = document.getElementById('txList');
    onValue(ref(db, 'transactions'), (snap) => {
      const txs = snap.val() || {};
      const html = Object.values(txs).slice(-20).reverse().map(t => `
        <div class="tx">
          <span class="hash">${t.hash || '0x...'}</span>
          <span class="amount">${t.amount || 0} NDOG</span>
          <span style="color:#b0c4de;font-size:12px;">${new Date(t.time).toLocaleString('ar-EG')}</span>
        </div>
      `).join('');
      list.innerHTML = html || '<div class="tx">لا توجد معاملات بعد.</div>';
    });
  </script>
</body>
</html>
