<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>لوحة المتصدرين | NileDogs</title>
  <link rel="icon" href="./assets/icons/favicon.png" />
  <link rel="stylesheet" href="./css/styles.css?v=2.0.5" />
  <style>
    .page-wrap { max-width: 800px; margin: 80px auto 40px; padding: 0 20px; }
    .lb-entry { display: flex; justify-content: space-between; padding: 12px 16px; background: rgba(10,31,68,0.5); backdrop-filter: blur(8px); border-radius: 16px; margin-bottom: 8px; border: 1px solid rgba(255,215,0,0.1); }
    .lb-entry .rank { color: #ffd700; font-weight: bold; width: 40px; }
    .lb-entry .name { flex: 1; }
    .lb-entry .score { color: #2ecc71; }
    .podium { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
    .podium .place { text-align: center; background: rgba(10,31,68,0.7); padding: 16px; border-radius: 20px; width: 100px; }
    .podium .place.gold { border-color: #ffd700; }
    .podium .place.silver { border-color: #c0c0c0; }
    .podium .place.bronze { border-color: #cd7f32; }
  </style>
</head>
<body>
  <div class="page-wrap">
    <h1 style="color:#ffd700;">🏆 لوحة المتصدرين</h1>
    <div class="podium" id="podium"></div>
    <div id="lbList"></div>
    <p style="margin-top:20px;"><a href="./" class="btn btn--ghost">← العودة للتطبيق</a></p>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    import { getDatabase, ref, onValue, query, orderByChild, limitToLast } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';
    const firebaseConfig = {
      apiKey: "AIzaSyAwvOJCX4qSAtqcF_fcnHtQgsTArnIrrhc",
      authDomain: "ndog-a3265.firebaseapp.com",
      databaseURL: "https://ndog-a3265-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "ndog-a3265",
      storageBucket: "ndog-a3265.firebasestorage.app",
      messagingSenderId: "829364393352",
      appId: "1:829364393352:web:82d0d0a99a3b3f2200163d"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const podium = document.getElementById('podium');
    const list = document.getElementById('lbList');

    const usersRef = ref(db, 'users');
    onValue(usersRef, (snap) => {
      const users = snap.val() || {};
      const sorted = Object.values(users)
        .filter(u => u.balance !== undefined)
        .sort((a, b) => (b.balance || 0) - (a.balance || 0))
        .slice(0, 10);
      // Podium (top 3)
      const podiumHtml = sorted.slice(0, 3).map((u, i) => {
        const cls = ['gold', 'silver', 'bronze'][i];
        return `<div class="place ${cls}"><div>${['🥇','🥈','🥉'][i]}</div><div>${u.displayName || 'مجهول'}</div><div style="color:#ffd700;">${u.balance || 0}</div></div>`;
      }).join('');
      podium.innerHTML = podiumHtml;

      // List (4-10)
      const listHtml = sorted.slice(3).map((u, i) => `
        <div class="lb-entry">
          <span class="rank">#${i+4}</span>
          <span class="name">${u.displayName || 'مجهول'}</span>
          <span class="score">${u.balance || 0} NDOG</span>
        </div>
      `).join('');
      list.innerHTML = listHtml || '<div class="lb-entry">لا توجد بيانات كافية.</div>';
    });
  </script>
</body>
</html>
