<!DOCTYPE html> 
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>لوحة التحكم - NDOG</title>
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#0a0e1a;
  --bg2:#0f1525;
  --card:#131929;
  --card2:#1a2235;
  --border:#1e2d45;
  --accent:#f59e0b;
  --accent2:#ef4444;
  --green:#22c55e;
  --blue:#3b82f6;
  --purple:#8b5cf6;
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#64748b;
  --red:#ef4444;
  --radius:12px;
  --sidebar:260px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* ===== LOGIN SCREEN ===== */
#loginScreen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:9999;
}
.login-box{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:40px 32px;width:100%;max-width:420px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.login-step{display:none}
.login-step.active{display:block}
.form-group{margin-bottom:18px;text-align:right}
.form-label{display:block;font-size:13px;color:var(--text2);margin-bottom:7px;font-weight:500}
.form-input{
  width:100%;padding:13px 16px;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);font-size:15px;outline:none;transition:.2s;
  font-family:inherit;letter-spacing:.08em;
}
.form-input:focus{border-color:var(--accent);background:#0f1525}
.form-input::placeholder{color:var(--text3);letter-spacing:0}
.btn-login{
  width:100%;padding:14px;background:linear-gradient(135deg,#f59e0b,#ef4444);
  border:none;border-radius:10px;color:#000;font-size:16px;font-weight:700;
  cursor:pointer;transition:.2s;letter-spacing:.5px;
}
.btn-login:hover{opacity:.9;transform:translateY(-1px)}
.login-error{
  background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);
  border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);
  margin-bottom:14px;display:none;
}
.login-error.show{display:block}
.secret-hint{font-size:12px;color:var(--text3);margin-top:8px;opacity:.6}

/* ===== LAYOUT ===== */
#adminApp{display:none;min-height:100vh;overflow-x:hidden;}
.layout{display:flex;min-height:100vh;width:100%;}

/* SIDEBAR (DESKTOP ONLY) */
.sidebar{
  width:var(--sidebar);background:var(--card);border-left:1px solid var(--border);
  position:fixed;top:0;right:0;height:100vh;display:flex;flex-direction:column;
  z-index:100;transition:.3s;overflow-y:auto;overflow-x:hidden;
}
.sidebar-brand{
  padding:22px 20px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.brand-logo{font-size:28px}
.brand-name{font-size:17px;font-weight:700;color:var(--accent)}
.brand-badge{
  font-size:10px;background:var(--red);color:#fff;padding:2px 6px;
  border-radius:4px;font-weight:600;margin-right:4px;
}
.sidebar-nav{flex:1;overflow-y:auto;padding:10px 0}
.nav-section{padding:8px 16px 4px;font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 20px;
  font-size:14px;color:var(--text2);cursor:pointer;border-radius:8px;
  margin:1px 8px;transition:.2s;border:none;background:none;width:calc(100% - 16px);text-align:right;
}
.nav-item:hover{background:var(--card2);color:var(--text)}
.nav-item.active{background:rgba(245,158,11,.12);color:var(--accent)}
.nav-item .nav-icon{font-size:17px;min-width:20px;text-align:center}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border)}
.admin-info{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.admin-avatar{width:36px;height:36px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.admin-name{font-size:13px;font-weight:600;color:var(--text)}
.admin-role{font-size:11px;color:var(--text3)}
.btn-signout{
  width:100%;padding:9px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  border-radius:8px;color:var(--red);font-size:13px;cursor:pointer;transition:.2s;font-family:inherit;
}
.btn-signout:hover{background:rgba(239,68,68,.2)}

/* TOPBAR */
.topbar{
  position:fixed;top:0;left:0;right:var(--sidebar);height:62px;
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;z-index:90;gap:16px;
}
.topbar-title{font-size:18px;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer}
.live-badge{
  display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green);
  background:rgba(34,197,94,.1);padding:5px 10px;border-radius:6px;
}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* MAIN CONTENT */
.main{margin-right:var(--sidebar);margin-top:62px;padding:24px;min-height:calc(100vh - 62px);width:100%;max-width:100vw;overflow-x:hidden;}

/* PAGES */
.page{display:none;animation:fadeIn .3s ease;}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* FORMS */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:16px}
.form-col{display:flex;flex-direction:column}
.form-input{
  width:100%;padding:12px;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:.2s;
}
.form-input:focus{border-color:var(--accent)}
.form-select{
  width:100%;padding:12px;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;outline:none;cursor:pointer;
}
.form-select:focus{border-color:var(--accent)}

/* LIVE SCORE INPUT SECTION */
.live-score-section{
  background:rgba(245,158,11,.1);border:2px solid var(--accent);border-radius:var(--radius);
  padding:18px;margin:16px 0;display:none;
}
.live-score-section.show{display:block;animation:slideDown .3s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.live-score-header{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;color:var(--accent);font-weight:600;
}
.live-score-header i{font-size:18px}
.score-inputs{
  display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;
}
.score-input-box{
  display:flex;flex-direction:column}
.score-input-box label{font-size:12px;color:var(--text3);margin-bottom:6px}
.score-input-box input{
  font-size:20px;font-weight:700;padding:10px;background:var(--bg2);border:2px solid var(--accent);
  border-radius:8px;color:var(--accent);text-align:center;outline:none;
}
.score-separator{
  font-size:24px;color:var(--accent);font-weight:700}

/* BUTTONS */
.btn{
  padding:10px 18px;border:none;border-radius:8px;font-size:14px;cursor:pointer;
  transition:.2s;font-family:inherit;font-weight:600;
}
.btn-primary{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#000}
.btn-primary:hover{opacity:.9;transform:translateY(-2px)}
.btn-info{background:rgba(59,130,246,.2);color:#3b82f6}
.btn-info:hover{background:rgba(59,130,246,.3)}
.btn-danger{background:rgba(239,68,68,.2);color:#ef4444}
.btn-danger:hover{background:rgba(239,68,68,.3)}
.btn-success{background:rgba(34,197,94,.2);color:#22c55e}
.btn-success:hover{background:rgba(34,197,94,.3)}

/* TABLES */
.table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;max-width:100%;}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.table-title{font-size:15px;font-weight:600;color:var(--text)}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:900px}
th{background:var(--bg2);padding:11px 14px;text-align:right;font-size:12px;color:var(--text3);font-weight:600;white-space:nowrap}
td{padding:11px 14px;border-top:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}

/* TOAST NOTIFICATION */
.toast-container{position:fixed;bottom:20px;left:20px;z-index:10000}
.toast{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:12px;
  animation:slideIn .3s ease;min-width:280px}
.toast.success{border-color:var(--green)}
.toast.error{border-color:var(--red)}
.toast.info{border-color:var(--blue)}
@keyframes slideIn{from{transform:translateX(-350px);opacity:0}to{transform:translateX(0);opacity:1}}

/* LOADER */
.global-loader{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:9998}
.global-loader.active{display:flex}
.spinner{width:50px;height:50px;border:4px solid rgba(245,158,11,.2);border-top:4px solid var(--accent);
  border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MATCH STATUS BADGE */
.status-badge{
  display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
}
.status-upcoming{background:rgba(59,130,246,.2);color:#3b82f6}
.status-live{background:rgba(245,158,11,.2);color:var(--accent);animation:blink 1.5s infinite}
.status-finished{background:rgba(34,197,94,.2);color:var(--green)}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.6}}

@media(max-width:768px){
  .sidebar{width:200px}
  .topbar{right:200px}
  .main{margin-right:200px}
  .score-inputs{grid-template-columns:1fr}
  .score-separator{display:none}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🔐</div>
    <div class="login-title">لوحة التحكم</div>
    <div class="login-sub">إدارة المباريات والمستخدمين</div>
    
    <div id="loginError" class="login-error"></div>
    
    <div id="step1" class="login-step active">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" id="adminEmail" class="form-input" placeholder="admin@example.com">
      </div>
      <button class="btn-login" onclick="loginStep1()">التالي</button>
    </div>
    
    <div id="step2" class="login-step">
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input type="password" id="adminPassword" class="form-input" placeholder="••••••••">
      </div>
      <button class="btn-login" onclick="loginStep2()">دخول</button>
      <button class="btn-login" style="margin-top:10px;background:#666" onclick="backToStep1()">رجوع</button>
    </div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp">
  <div class="layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-logo">⚙️</span>
        <span class="brand-name">NDOG Admin</span>
        <span class="brand-badge">LIVE</span>
      </div>
      
      <div class="sidebar-nav">
        <div class="nav-section">القائمة الرئيسية</div>
        <button class="nav-item active" onclick="switchPage('matches')">
          <span class="nav-icon">🏆</span> <span>المباريات</span>
        </button>
        <button class="nav-item" onclick="switchPage('users')">
          <span class="nav-icon">👥</span> <span>المستخدمين</span>
        </button>
        <button class="nav-item" onclick="switchPage('config')">
          <span class="nav-icon">⚙️</span> <span>الإعدادات</span>
        </button>
      </div>
      
      <div class="sidebar-footer">
        <div class="admin-info">
          <div class="admin-avatar">👤</div>
          <div>
            <div class="admin-name" id="adminNameDisplay">المسؤول</div>
            <div class="admin-role">Admin Panel</div>
          </div>
        </div>
        <button class="btn-signout" onclick="logout()">تسجيل الخروج</button>
      </div>
    </div>
    
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">إدارة المباريات</div>
      <div class="topbar-right">
        <div class="live-badge">
          <span class="live-dot"></span> LIVE DASHBOARD
        </div>
      </div>
    </div>
    
    <!-- MAIN CONTENT -->
    <div class="main">
      
      <!-- MATCHES PAGE -->
      <div id="matches" class="page active">
        
        <!-- ADD/EDIT MATCH FORM -->
        <div class="form-card">
          <h2 style="margin-bottom:20px">➕ إضافة / تعديل مباراة</h2>
          
          <div class="form-row">
            <div class="form-col">
              <label class="form-label">الفريق الأول</label>
              <input type="text" id="matchTeam1" class="form-input" placeholder="مثال: الأهلي">
            </div>
            <div class="form-col">
              <label class="form-label">الفريق الثاني</label>
              <input type="text" id="matchTeam2" class="form-input" placeholder="مثال: الزمالك">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-col">
              <label class="form-label">التاريخ</label>
              <input type="date" id="matchDate" class="form-input">
            </div>
            <div class="form-col">
              <label class="form-label">الوقت</label>
              <input type="time" id="matchTime" class="form-input">
            </div>
            <div class="form-col">
              <label class="form-label">الجائزة</label>
              <input type="number" id="matchPrize" class="form-input" value="10000">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-col">
              <label class="form-label">حالة المباراة</label>
              <select id="matchStatus" class="form-select" onchange="updateScoreVisibility()">
                <option value="upcoming">قادمة</option>
                <option value="live">جارية الآن</option>
                <option value="finished">انتهت</option>
              </select>
            </div>
          </div>
          
          <!-- LIVE SCORE INPUT -->
          <div id="liveScoreSection" class="live-score-section">
            <div class="live-score-header">
              <i class="fas fa-fire"></i> إدخال النتائج الحية
            </div>
            <div class="score-inputs">
              <div class="score-input-box">
                <label id="scoreLabel1">الفريق 1</label>
                <input type="number" id="matchScore1" class="form-input" min="0" value="0">
              </div>
              <div class="score-separator">:</div>
              <div class="score-input-box">
                <label id="scoreLabel2">الفريق 2</label>
                <input type="number" id="matchScore2" class="form-input" min="0" value="0">
              </div>
            </div>
          </div>
          
          <!-- FINAL RESULT (for finished matches) -->
          <div id="resultSection" style="display:none;margin-top:16px">
            <label class="form-label">نتيجة المباراة (عند الانتهاء)</label>
            <select id="matchResult" class="form-select">
              <option value="">-- اختر النتيجة --</option>
              <option value="team1">فوز الفريق الأول</option>
              <option value="draw">تعادل</option>
              <option value="team2">فوز الفريق الثاني</option>
            </select>
          </div>
          
          <div style="margin-top:24px;display:flex;gap:12px">
            <button class="btn btn-primary" onclick="saveMatch()">💾 حفظ المباراة</button>
            <button class="btn btn-info" onclick="clearMatchForm()" style="background:var(--bg2)">🔄 إعادة تعيين</button>
          </div>
        </div>
        
        <!-- MATCHES LIST -->
        <div class="table-card">
          <div class="table-header">
            <div class="table-title">📋 قائمة المباريات</div>
          </div>
          <div class="table-wrap" id="matchesList">
            <!-- loaded dynamically -->
          </div>
        </div>
        
      </div>
      
      <!-- USERS PAGE -->
      <div id="users" class="page">
        <div class="form-card">
          <h2>👥 إدارة المستخدمين</h2>
          <p style="margin-top:20px;color:var(--text2)">سيتم إضافة وظائف المستخدمين قريباً</p>
        </div>
      </div>
      
      <!-- CONFIG PAGE -->
      <div id="config" class="page">
        <div class="form-card">
          <h2>⚙️ الإعدادات</h2>
          <p style="margin-top:20px;color:var(--text2)">سيتم إضافة الإعدادات قريباً</p>
        </div>
      </div>
      
    </div>
  </div>
</div>

<!-- LOADER -->
<div class="global-loader" id="globalLoader">
  <div class="spinner"></div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDoF3VDweFb3S3PYsfJvF0OhLYOYOKv8HY",
  authDomain: "ndog-a3265.firebaseapp.com",
  databaseURL: "https://ndog-a3265-default-rtdb.firebaseio.com",
  projectId: "ndog-a3265",
  storageBucket: "ndog-a3265.appspot.com",
  messagingSenderId: "518330722387",
  appId: "1:518330722387:web:c7db7c449f3a7a3f6f15d3"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ============= LOGIN SYSTEM =============
function showErrorMsg(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

function loginStep1() {
  const email = document.getElementById('adminEmail').value.trim();
  if (!email) return showErrorMsg('أدخل البريد الإلكتروني');
  
  // Check if email is authorized
  const authorizedEmails = ['elfannanm@gmail.com', 'mohamednasrofficial@gmail.com'];
  if (!authorizedEmails.includes(email)) {
    return showErrorMsg('هذا البريد الإلكتروني غير مرخص');
  }
  
  document.getElementById('step1').classList.remove('active');
  document.getElementById('step2').classList.add('active');
}

function backToStep1() {
  document.getElementById('adminPassword').value = '';
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.add('active');
}

function loginStep2() {
  const email = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPassword').value;
  
  if (!password) return showErrorMsg('أدخل كلمة المرور');
  
  showLoader();
  
  auth.signInWithEmailAndPassword(email, password)
    .then(userCredential => {
      hideLoader();
      const user = userCredential.user;
      
      // Save session to localStorage
      localStorage.setItem('adminSessionEmail', user.email);
      localStorage.setItem('adminSessionUID', user.uid);
      localStorage.setItem('adminSessionToken', user.refreshToken);
      
      // Show app
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminApp').style.display = 'block';
      document.getElementById('adminNameDisplay').textContent = user.email;
      
      loadMatches();
      showToast('✅ تم دخولك بنجاح', 'success');
    })
    .catch(err => {
      hideLoader();
      showErrorMsg('خطأ: ' + (err.message || 'فشل تسجيل الدخول'));
    });
}

function logout() {
  if (!confirm('هل تريد تسجيل الخروج؟')) return;
  
  // Clear session
  localStorage.removeItem('adminSessionEmail');
  localStorage.removeItem('adminSessionUID');
  localStorage.removeItem('adminSessionToken');
  
  auth.signOut().then(() => {
    document.getElementById('adminApp').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminEmail').value = '';
    document.getElementById('adminPassword').value = '';
    document.getElementById('step1').classList.add('active');
    document.getElementById('step2').classList.remove('active');
    showToast('👋 تم تسجيل الخروج', 'info');
  });
}

// Check session on page load
window.addEventListener('load', () => {
  const sessionEmail = localStorage.getItem('adminSessionEmail');
  if (sessionEmail) {
    auth.onAuthStateChanged(user => {
      if (user && user.email === sessionEmail) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminApp').style.display = 'block';
        document.getElementById('adminNameDisplay').textContent = user.email;
        loadMatches();
      } else {
        // Session expired
        localStorage.removeItem('adminSessionEmail');
        localStorage.removeItem('adminSessionUID');
        localStorage.removeItem('adminSessionToken');
        document.getElementById('loginScreen').style.display = 'flex';
      }
    });
  }
});

// ============= UTILITIES =============
function showLoader() {
  document.getElementById('globalLoader').classList.add('active');
}

function hideLoader() {
  document.getElementById('globalLoader').classList.remove('active');
}

function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.target.closest('.nav-item').classList.add('active');
  
  const titles = {
    matches: 'إدارة المباريات',
    users: 'إدارة المستخدمين',
    config: 'الإعدادات'
  };
  document.getElementById('pageTitle').textContent = titles[page];
}

// ============= MATCH MANAGEMENT =============
function updateScoreVisibility() {
  const status = document.getElementById('matchStatus').value;
  const liveSection = document.getElementById('liveScoreSection');
  const resultSection = document.getElementById('resultSection');
  
  if (status === 'live' || status === 'finished') {
    liveSection.classList.add('show');
  } else {
    liveSection.classList.remove('show');
  }
  
  resultSection.style.display = status === 'finished' ? 'block' : 'none';
}

let editingMatchId = null;

function saveMatch() {
  const team1 = document.getElementById('matchTeam1').value.trim();
  const team2 = document.getElementById('matchTeam2').value.trim();
  const matchDate = document.getElementById('matchDate').value;
  const matchTime = document.getElementById('matchTime').value;
  const prize = Number(document.getElementById('matchPrize').value) || 10000;
  const status = document.getElementById('matchStatus').value;
  const score1 = document.getElementById('matchScore1').value;
  const score2 = document.getElementById('matchScore2').value;
  const result = document.getElementById('matchResult').value || null;
  
  if (!team1 || !team2) return showToast('أدخل اسمي الفريقين', 'error');
  if (!matchDate || !matchTime) return showToast('أدخل التاريخ والوقت', 'error');
  if ((status === 'live' || status === 'finished') && (score1 === '' || score2 === '')) {
    return showToast('أدخل النتيجة', 'error');
  }
  
  const dateParts = matchDate.split('-');
  const timeParts = matchTime.split(':');
  const localDate = new Date(Number(dateParts[0]), Number(dateParts[1])-1, Number(dateParts[2]),
      Number(timeParts[0]), Number(timeParts[1]), 0, 0);
  const matchTimestamp = localDate.getTime();
  
  const matchData = {
    team1, team2, matchDate, matchTime, matchTimestamp, prize, status,
    score1: (status === 'live' || status === 'finished') ? Number(score1) : null,
    score2: (status === 'live' || status === 'finished') ? Number(score2) : null,
    result: status === 'finished' ? result : null,
    winnerProcessed: false,
    createdAt: Date.now()
  };
  
  showLoader();
  
  if (editingMatchId) {
    delete matchData.createdAt;
    db.ref('matches/' + editingMatchId).update(matchData).then(() => {
      hideLoader();
      showToast('✅ تم تحديث المباراة', 'success');
      editingMatchId = null;
      clearMatchForm();
      loadMatches();
    }).catch(err => {
      hideLoader();
      showToast('خطأ: ' + err.message, 'error');
    });
  } else {
    db.ref('matches').push(matchData).then(() => {
      hideLoader();
      showToast('✅ تم إضافة المباراة', 'success');
      clearMatchForm();
      loadMatches();
    }).catch(err => {
      hideLoader();
      showToast('خطأ: ' + err.message, 'error');
    });
  }
}

function clearMatchForm() {
  document.getElementById('matchTeam1').value = '';
  document.getElementById('matchTeam2').value = '';
  document.getElementById('matchDate').value = '';
  document.getElementById('matchTime').value = '';
  document.getElementById('matchPrize').value = '10000';
  document.getElementById('matchStatus').value = 'upcoming';
  document.getElementById('matchScore1').value = '0';
  document.getElementById('matchScore2').value = '0';
  document.getElementById('matchResult').value = '';
  document.getElementById('scoreLabel1').textContent = '';
  document.getElementById('scoreLabel2').textContent = '';
  document.getElementById('liveScoreSection').classList.remove('show');
  document.getElementById('resultSection').style.display = 'none';
  editingMatchId = null;
}

function loadMatches() {
  db.ref('matches').orderByChild('createdAt').once('value').then(snap => {
    const matches = [];
    snap.forEach(child => {
      matches.push(Object.assign({id: child.key}, child.val()));
    });
    matches.reverse();
    
    const listEl = document.getElementById('matchesList');
    if (matches.length === 0) {
      listEl.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text3)">لا توجد مباريات بعد</div>';
      return;
    }
    
    let html = '<table><thead><tr><th>#</th><th>الفريق 1</th><th>الفريق 2</th><th>التاريخ</th><th>الحالة</th><th>النتيجة</th><th>إجراءات</th></tr></thead><tbody>';
    matches.forEach((m, i) => {
      const statusClass = m.status === 'finished' ? 'status-finished' : m.status === 'live' ? 'status-live' : 'status-upcoming';
      const statusText = m.status === 'finished' ? 'انتهت' : m.status === 'live' ? 'جارية' : 'قادمة';
      const resultText = m.score1 != null ? `${m.score1} - ${m.score2}` : '—';
      const resultFinal = m.result ? (m.result === 'team1' ? 'فوز ' + m.team1 : m.result === 'draw' ? 'تعادل' : 'فوز ' + m.team2) : '—';
      
      html += '<tr>';
      html += '<td>' + (i+1) + '</td>';
      html += '<td><b>' + m.team1 + '</b></td>';
      html += '<td><b>' + m.team2 + '</b></td>';
      html += '<td>' + m.matchDate + '</td>';
      html += '<td><span class="status-badge ' + statusClass + '">' + statusText + '</span></td>';
      html += '<td><strong>' + resultText + '</strong></td>';
      html += '<td style="white-space:nowrap">';
      html += '<button class="btn btn-info" style="padding:6px 10px;font-size:11px" onclick="editMatch(\'' + m.id + '\')">✏️ تعديل</button> ';
      html += '<button class="btn btn-danger" style="padding:6px 10px;font-size:11px" onclick="deleteMatch(\'' + m.id + '\')">🗑️ حذف</button>';
      html += '</td></tr>';
    });
    html += '</tbody></table>';
    listEl.innerHTML = html;
  });
}

function editMatch(matchId) {
  db.ref('matches/' + matchId).once('value').then(snap => {
    const m = snap.val();
    if (!m) return;
    
    editingMatchId = matchId;
    document.getElementById('matchTeam1').value = m.team1 || '';
    document.getElementById('matchTeam2').value = m.team2 || '';
    document.getElementById('matchDate').value = m.matchDate || '';
    document.getElementById('matchTime').value = m.matchTime || '';
    document.getElementById('matchPrize').value = m.prize || 10000;
    document.getElementById('matchStatus').value = m.status || 'upcoming';
    document.getElementById('matchScore1').value = m.score1 != null ? m.score1 : '0';
    document.getElementById('matchScore2').value = m.score2 != null ? m.score2 : '0';
    document.getElementById('scoreLabel1').textContent = m.team1 || 'الفريق 1';
    document.getElementById('scoreLabel2').textContent = m.team2 || 'الفريق 2';
    document.getElementById('matchResult').value = m.result || '';
    
    updateScoreVisibility();
    window.scrollTo({top: 0, behavior: 'smooth'});
    showToast('✏️ جاري تعديل المباراة', 'info');
  });
}

function deleteMatch(matchId) {
  if (!confirm('هل أنت متأكد من حذف هذه المباراة؟')) return;
  
  showLoader();
  db.ref('matches/' + matchId).remove().then(() => {
    hideLoader();
    showToast('🗑️ تم حذف المباراة', 'success');
    loadMatches();
  }).catch(err => {
    hideLoader();
    showToast('خطأ: ' + err.message, 'error');
  });
}
</script>
