<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>التحويط — NileDogs</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="./assets/icons/icon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg-deep: #050b1a; --gold: #ffd700; --text: #e2e8f0; --text-dim: #94a3b8; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg-deep); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 2rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: var(--text-dim); margin-bottom: 1.5rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.875rem 2rem;
      background: linear-gradient(135deg, var(--gold), #ffaa00);
      color: var(--bg-deep); font-weight: 700; border-radius: 12px;
      text-decoration: none; transition: all 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,215,0,0.3); }
    .countdown { color: var(--text-dim); margin-top: 1.5rem; font-size: 0.9rem; }
    .countdown span { color: var(--gold); font-weight: 700; }
  </style>
</head>
<body>
  <div class="icon">🏦</div>
  <h1>تحويط NDOG</h1>
  <p>جاري التحويل لصفحة التحويط في التطبيق الرئيسي...</p>
  <a href="./index.html#view-staking" class="btn">فتح التحويط ←</a>
  <p class="countdown">تحويل تلقائي خلال <span id="cd">5</span> ثوانٍ</p>
  <script>
    let s = 5; const el = document.getElementById('cd');
    const t = setInterval(() => { s--; el.textContent = s; if (s <= 0) { clearInterval(t); window.location.href = './index.html#view-staking'; } }, 1000);
  </script>
</body>
</html>
