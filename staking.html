<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>التخزين | NileDogs</title>
  <link rel="icon" href="./assets/icons/favicon.png" />
  <link rel="stylesheet" href="./css/styles.css?v=2.0.5" />
  <style>
    .page-wrap { max-width: 800px; margin: 80px auto 40px; padding: 0 20px; }
    .pool { background: rgba(10,31,68,0.7); backdrop-filter: blur(18px); border: 1px solid rgba(255,215,0,0.2); border-radius: 24px; padding: 20px; margin-bottom: 16px; }
    .pool .apr { color: #2ecc71; font-weight: bold; }
    .btn-stake { background: linear-gradient(135deg, #ffd700, #f0a500); color: #0a1f44; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <div class="page-wrap">
    <h1 style="color:#ffd700;">⛓️ التخزين (Staking)</h1>
    <div id="poolsContainer"></div>
    <p style="margin-top:20px;"><a href="./" class="btn btn--ghost">← العودة للتطبيق</a></p>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
    import { getDatabase, ref, onValue, set, get, update } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
    const firebaseConfig = {
      apiKey: "AIzaSyAwvOJCX4qSAtqcF_fcnHtQgsTArnIrrhc",
      authDomain: "ndog-a3265.firebaseapp.com",
      databaseURL: "https://ndog-a3265-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "ndog-a3265",
      storageBucket: "ndog-a3265.firebasestorage.app",
      messagingSenderId: "829364393352",
      appId: "1:829364393352:web:82d0d0a99a3b3f2200163d"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    let currentUser = null;
    onAuthStateChanged(auth, user => { currentUser = user; });

    const pools = [
      { days: 30, apr: 5, label: '30 يوم' },
      { days: 90, apr: 10, label: '90 يوم' },
      { days: 180, apr: 15, label: '180 يوم' },
      { days: 365, apr: 25, label: '365 يوم' }
    ];

    const container = document.getElementById('poolsContainer');
    onValue(ref(db, 'staking'), (snap) => {
      const stakes = snap.val() || {};
      const html = pools.map(p => {
        const userStake = stakes[currentUser?.uid]?.[p.days] || 0;
        return `
          <div class="pool">
            <div><strong>${p.label}</strong> — APR: <span class="apr">${p.apr}%</span></div>
            <div>مخزونك: ${userStake} NDOG</div>
            <input type="number" id="amount-${p.days}" placeholder="المبلغ" style="width:120px;padding:6px;border-radius:12px;border:1px solid rgba(255,215,0,0.3);background:rgba(255,255,255,0.05);color:#fff;" />
            <button class="btn-stake" data-days="${p.days}" data-apr="${p.apr}">تخزين</button>
          </div>
        `;
      }).join('');
      container.innerHTML = html;

      container.querySelectorAll('.btn-stake').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!currentUser) { alert('يرجى تسجيل الدخول'); return; }
          const days = parseInt(btn.dataset.days);
          const amountInput = document.getElementById(`amount-${days}`);
          const amount = parseFloat(amountInput.value);
          if (!amount || amount <= 0) { alert('أدخل مبلغاً صحيحاً'); return; }
          const uid = currentUser.uid;
          const userRef = ref(db, `users/${uid}`);
          const userSnap = await get(userRef);
          const user = userSnap.val() || {};
          if ((user.balance || 0) < amount) { alert('رصيدك غير كافٍ'); return; }
          // خصم من الرصيد وإضافة إلى التخزين
          const newBalance = (user.balance || 0) - amount;
          const stakingRef = ref(db, `staking/${uid}/${days}`);
          const currentStake = (await get(stakingRef)).val() || 0;
          await update(userRef, { balance: newBalance });
          await set(stakingRef, currentStake + amount);
          alert(`تم تخزين ${amount} NDOG لمدة ${days} يوم بنسبة ${btn.dataset.apr}% APR.`);
        });
      });
    });
  </script>
</body>
</html>
