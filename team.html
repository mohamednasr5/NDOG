<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>الفريق | NileDogs</title>
  <link rel="icon" href="./assets/icons/favicon.png" />
  <link rel="stylesheet" href="./css/styles.css?v=2.0.5" />
  <style>
    .page-wrap { max-width: 900px; margin: 80px auto 40px; padding: 0 20px; }
    .card { background: rgba(10,31,68,0.7); backdrop-filter: blur(18px); border: 1px solid rgba(255,215,0,0.2); border-radius: 24px; padding: 30px; margin-bottom: 20px; }
    .card h2 { color: #ffd700; }
    .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .member { text-align: center; padding: 16px; background: rgba(255,255,255,0.05); border-radius: 16px; }
    .member .avatar { font-size: 48px; }
    .member .name { font-weight: bold; color: #fff; margin-top: 8px; }
    .member .role { color: #b0c4de; font-size: 14px; }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="card">
      <h1>👨‍💻 فريق NileDogs</h1>
      <p>مجتمع مستقل من المطورين والمتحمسين للكريبتو.</p>
      <div class="team-grid">
        <div class="member"><div class="avatar">🐕</div><div class="name">محمد نصر</div><div class="role">المؤسس التقني</div></div>
        <div class="member"><div class="avatar">🦊</div><div class="name">أحمد علي</div><div class="role">مطور الواجهات</div></div>
        <div class="member"><div class="avatar">🐺</div><div class="name">سارة خالد</div><div class="role">مسوقة مجتمع</div></div>
        <div class="member"><div class="avatar">🦅</div><div class="name">يوسف حسن</div><div class="role">خبير أمن</div></div>
      </div>
      <p style="margin-top:20px;"><a href="./" class="btn btn--ghost">← العودة للتطبيق</a></p>
    </div>
  </div>
</body>
</html>
