name = "ndog-push-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# ═══════════════════════════════════════════════
#  NDOG Coin — Cloudflare Worker Config
# ═══════════════════════════════════════════════
#
# STEPS TO DEPLOY:
#
# 1. Install Wrangler CLI (if not installed):
#    npm install -g wrangler
#
# 2. Login to Cloudflare:
#    wrangler login
#
# 3. Set environment variables (secrets) — these are stored ENCRYPTED:
#    wrangler secret put ONESIGNAL_REST_KEY
#      → Paste your OneSignal REST API Key when prompted
#
#    wrangler secret put WORKER_SECRET
#      → Paste a strong secret (same value you put in momo.html WORKER_SECRET)
#
# 4. Deploy:
#    wrangler deploy
#
# 5. After deployment, Wrangler will print the Worker URL.
#    Update WORKER_URL in momo.html with that URL.
#
# ═══════════════════════════════════════════════

# Environment variables (non-secret — can also be set via dashboard)
[vars]
ONESIGNAL_APP_ID = "84479925-fa80-47df-a5c8-599c56739791"